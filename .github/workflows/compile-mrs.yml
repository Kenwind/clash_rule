name: Compile MRS rule sets

on:
  push:
    paths:
      - 'AI.list'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mihomo
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz" | gunzip > mihomo
          chmod +x mihomo

      - name: Convert AI.list to domain format and compile MRS
        run: |
          # Extract domain rules from classical format into domain behavior format:
          #   DOMAIN,x.com        -> x.com
          #   DOMAIN-SUFFIX,x.com -> +.x.com
          # Skip non-domain rules (IP-CIDR, DOMAIN-KEYWORD, IP-ASN etc.)
          python3 -c "
          import sys
          for line in open('AI.list'):
              line = line.strip()
              if not line or line.startswith('#'):
                  continue
              parts = line.split(',', 1)
              if len(parts) < 2:
                  continue
              rtype, domain = parts[0].strip(), parts[1].strip().rstrip(',no-resolve')
              if rtype == 'DOMAIN':
                  print(domain)
              elif rtype == 'DOMAIN-SUFFIX':
                  print('+.' + domain)
          " > AI_domain.list
          echo "Converting $(wc -l < AI_domain.list) domain rules to mrs..."
          ./mihomo convert-ruleset domain text AI_domain.list AI.mrs
          rm AI_domain.list
          echo "AI.mrs compiled successfully ($(wc -c < AI.mrs) bytes)"

      - name: Commit MRS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AI.mrs
          git diff --cached --quiet || git commit -m "auto: compile AI.mrs from AI.list"
          git push
